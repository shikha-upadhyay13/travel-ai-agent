version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: travel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 4G

  app:
    build: .
    container_name: travel-ai-agent
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=llama3
      - DB_PATH=/app/data/travel_agent.db
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - app_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  app_data:
